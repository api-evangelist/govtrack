apis:
  - aid: govtrack:govtrack-api
    name: GovTrack REST API
    description: Read-only REST API providing access to U.S. Congressional data including bills and resolutions, roll call votes, member profiles, committee information, cosponsorship records, and congressional roles. No authentication or API key is required. Responses are available in JSON, JSONP, CSV, and XML formats.
